$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
name: tfidf_transform
display_name: TF-IDF Transform
type: command

inputs:
  data:
    type: uri_folder
  model_dir:
    type: uri_folder
  text_col:
    type: string
    default: reviewText

outputs:
  out:
    type: uri_folder

code: .
command: >-
  python tfidf_transform.py
  --data ${{inputs.data}}
  --model_dir ${{inputs.model_dir}}
  --text_col ${{inputs.text_col}}
  --out ${{outputs.out}}

environment: azureml:AzureML-sklearn-1.1-ubuntu20.04-py38-cpu@latest