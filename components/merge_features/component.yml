$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
name: merge_features
display_name: Merge All Features
type: command

inputs:
  base:
    type: uri_folder
  length:
    type: uri_folder
  sentiment:
    type: uri_folder
  tfidf:
    type: uri_folder
  sbert:
    type: uri_folder
  key1:
    type: string
    default: asin
  key2:
    type: string
    default: reviewerID

outputs:
  out:
    type: uri_folder

code: .
command: >-
  python merge_features.py
  --base ${{inputs.base}}
  --length ${{inputs.length}}
  --sentiment ${{inputs.sentiment}}
  --tfidf ${{inputs.tfidf}}
  --sbert ${{inputs.sbert}}
  --key1 ${{inputs.key1}}
  --key2 ${{inputs.key2}}
  --out ${{outputs.out}}

environment: azureml:AzureML-sklearn-1.1-ubuntu20.04-py38-cpu@latest