$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
name: tfidf_fit
display_name: TF-IDF Fit (Train Only)
type: command

inputs:
  data:
    type: uri_folder
  text_col:
    type: string
    default: reviewText
  max_features:
    type: integer
    default: 5000
  ngram_max:
    type: integer
    default: 1

outputs:
  model_out:
    type: uri_folder

code: .
command: >-
  python tfidf_fit.py
  --data ${{inputs.data}}
  --text_col ${{inputs.text_col}}
  --max_features ${{inputs.max_features}}
  --ngram_max ${{inputs.ngram_max}}
  --model_out ${{outputs.model_out}}

environment: azureml:AzureML-sklearn-1.1-ubuntu20.04-py38-cpu@latest